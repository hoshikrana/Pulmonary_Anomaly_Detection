{% extends "base.html" %}

{% block title %}Login — Pulmonary Anomaly Detection{% endblock %}

{% block content %}

<section class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Welcome Back</h1>
      <p>Login to your account to continue</p>
    </div>

    <form class="auth-form" id="login-form">
      <div class="form-group">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" id="email" name="email" class="form-input" required placeholder="you@example.com">
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" name="password" class="form-input" required placeholder="••••••••">
      </div>

      <div class="form-options">
        <label class="checkbox-label">
          <input type="checkbox" name="remember" class="checkbox-input">
          <span>Remember me</span>
        </label>
        <a href="/auth/forgot-password" class="link">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-primary btn-full">Login</button>
    </form>

    <div class="auth-divider">
      <span>or</span>
    </div>

    <p class="auth-footer">
      Don't have an account?
      <a href="/auth/signup" class="link">Sign up here</a>
    </p>
  </div>
</section>

{% endblock %}

{% block extra_scripts %}
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
