<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Pulmonary Anomaly Detection{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  {% block extra_head %}{% endblock %}
</head>
<body>

  <header class="site-header">
    <div class="container">
      <a href="/" class="logo">
        <span class="logo-icon"></span>
        <span class="logo-text">Pulmonary Anomaly Detection</span>
      </a>
      <nav class="site-nav">
        <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">Analyse</a>
        <a href="/api/health" class="nav-link" target="_blank">API Status</a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Pulmonary Anomaly Detection in Chest Radiographs &mdash; Final Year Research Project</p>
      <p class="footer-note">For research purposes only. Not a clinical diagnostic tool.</p>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/utils.js') }}"></script>
  {% block extra_scripts %}{% endblock %}

</body>
</html>
